shift+s		screenshot
WHEEL_UP	add volume			 5
WHEEL_DOWN	add volume			-5
WHEEL_LEFT	ignore
WHEEL_RIGHT	ignore
PGUP		seek				 60
PGDWN		seek				-60
ESC		set fullscreen			 no
Ctrl+0		set speed			 1.0
Ctrl+1		multiply speed			 1/1.1
Ctrl+2		multiply speed			 2.0
SPACE		cycle				 pause
Ctrl+d 		add sub-delay 			-0.1
Ctrl+D		add sub-delay			+0.1
Alt+D		add audio-delay			 0.100
Alt+d		add audio-delay			-0.100
v 		cycle sub-visibility
Alt+v 		cycle secondary-sub-visibility
f		cycle fullscreen
i 		script-binding stats/display-stats-toggle
